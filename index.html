	<!DOCTYPE html>
	<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>多人聊天室</title>
		<style>
			@import url("https://fonts.googleapis.com/css?family=Source+Sans+Pro:200,200i,300,300i,400,400i,600,600i,700,700i,900,900i|Monoton");
			@import url("https://fonts.googleapis.com/icon?family=Material+Icons");

			* {
				box-sizing: border-box;
			}

			html {
				font-size: 14px;
			}

			body {
				background: linear-gradient(to bottom, #68d8d6, #ffffff);
				color: #454749;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: "Source Sans Pro", sans-serif;
				min-height: 100vh;
			}

			h1,
			h2,
			h3,
			h4,
			h5,
			h6 {
				font-family: Monoton, sans-serif;
				margin-bottom: 0.5rem;
			}

			.tile {
				background-color: #ffffff;
				border-radius: 0.1rem;
				box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.2), 0 0.25rem 0.25rem rgba(0, 0, 0, 0.2);
				position: relative;
				width: 100%;
				min-width: 320px;
				max-width: 24rem;
				overflow: hidden;
			}

			.tile .tile-header {
				background-image: url("https://res.cloudinary.com/dgmilxzy7/image/upload/c_scale,w_500,o_75,b_rgb:07beb8/v1506735375/CodePen/ViddenPixel.jpg");
				background-position: center;
				background-size: cover;
				height: 12rem;
			}

			.tile .tile-body {
				padding: 2rem;
			}

			.form-input {
				display: block;
				position: relative;
				margin-bottom: 1rem;
			}

			.form-input>.material-icons {
				position: absolute;
				font-size: 1.5rem;
				top: 1.2rem;
			}

			.form-input>.material-icons~input,
			.form-input>.material-icons~.label,
			.form-input>.material-icons~.underline {
				margin-left: 2.25rem;
				width: calc(100% - 2.25rem);
			}

			.form-input input {
				border: none;
				box-shadow: none;
				padding-top: 1.5rem;
				padding-right: 0;
				padding-bottom: 0.5rem;
				padding-left: 0;
				outline-style: none;
				width: 100%;
			}

			.form-input input~.label {
				color: #868e96;
				font-size: 1rem;
				margin: 0;
				pointer-events: none;
				position: absolute;
				top: 1.5rem;
				left: 0;
				transition: top 0.2s, font 0.2s;
				z-index: 1;
			}

			.form-input input~.underline {
				background-color: #bdc1c5;
				height: 1px;
				width: 100%;
				position: absolute;
				bottom: 0;
				left: 0;
			}

			.form-input input:hover~.underline,
			.form-input input:focus~.underline {
				background-color: #07beb8;
			}

			.form-input input:hover~.label,
			.form-input input:focus~.label {
				color: #07beb8;
			}

			.form-input input:focus~.underline {
				height: 2px;
			}

			.form-input input:focus~.label,
			.form-input input:valid~.label {
				top: 0;
				font-size: 0.85rem;
			}

			.form-input input:-webkit-autofill~.label {
				top: 0;
				font-size: 0.85rem;
			}

			.btn {
				border-radius: 0.2rem;
				display: inline-block;
				padding-top: 0.5rem;
				padding-right: 1rem;
				padding-bottom: 0.5rem;
				padding-left: 1rem;
			}

			.btn,
			[role=button],
			[type=button] {
				-ms-touch-action: manipulation;
				touch-action: manipulation;
				cursor: pointer;
			}

			.btn-irenic {
				background-color: #07beb8;
				color: white;
			}

			.btn-irenic:hover,
			.btn-irenic:focus,
			.btn-irenic:active {
				background-color: #06a5a0;
			}

			.btn-serene {
				background-color: #3dccc7;
				color: white;
			}

			.btn-serene:hover,
			.btn-serene:focus,
			.btn-serene:active {
				background-color: #32beb9;
			}

			.btn-tranquil {
				background-color: #68d8d6;
				color: white;
			}

			.btn-tranquil:hover,
			.btn-tranquil:focus,
			.btn-tranquil:active {
				background-color: #54d3d0;
			}

			.btn-calm {
				background-color: #9ceaef;
				color: white;
			}

			.btn-calm:hover,
			.btn-calm:focus,
			.btn-calm:active {
				background-color: #86e5eb;
			}

			.btn-cool {
				background-color: #c4fff9;
				color: white;
			}

			.btn-cool:hover,
			.btn-cool:focus,
			.btn-cool:active {
				background-color: #abfff6;
			}

			.btn-ice {
				background-color: #ffffff;
				color: white;
			}

			.btn-ice:hover,
			.btn-ice:focus,
			.btn-ice:active {
				background-color: #f2f2f2;
			}

			.btn-base {
				background-color: #454749;
				color: white;
			}

			.btn-base:hover,
			.btn-base:focus,
			.btn-base:active {
				background-color: #393a3c;
			}

			.clearfix:after {
				content: "";
				display: table;
				clear: both;
			}

			.float-right {
				float: right;
			}

			.float-left {
				float: left;
			}

			.text-center {
				text-align: center;
				margin-top: 1rem;
				color: #666;
				cursor: pointer;
			}

			.text-center:hover {
				color: #07beb8;
			}

			.submit-container {
				position: relative;
			}

			.submit-container #submit,
			.submit-container #registerBtn {
				position: relative;
				z-index: 2;
				outline: none;
				opacity: 1;
				transition: transform 0.1s ease-in, opacity 0.1s ease-in, border-radius 0.1s ease-in;
				right: -1px;
			}

			.submit-container #submit span,
			.submit-container #registerBtn span {
				opacity: 1;
				transition: opacity 0.1s ease-in;
			}

			.submit-container #submit.pending,
			.submit-container #registerBtn.pending {
				transform: scale(0.55, 1.5);
				background-color: #07beb8;
				border-radius: 50%;
				opacity: 1;
			}

			.submit-container #submit.pending span,
			.submit-container #registerBtn.pending span {
				opacity: 0;
			}

			.submit-container #submit.pending~.login-pending,
			.submit-container #registerBtn.pending~.login-pending {
				opacity: 1;
				transform: scale(1, 1);
				z-index: 3;
			}

			.submit-container #submit.granted~.login-pending,
			.submit-container #registerBtn.granted~.login-pending {
				opacity: 1;
				transform: translate(-9rem, -11rem) scale(18, 18);
				z-index: 3;
			}

			.submit-container #submit.granted~.login-pending .spinner,
			.submit-container #registerBtn.granted~.login-pending .spinner {
				opacity: 0;
			}

			.submit-container #submit.granted~.login-pending .login-granted-content,
			.submit-container #registerBtn.granted~.login-pending .login-granted-content {
				opacity: 1;
			}

			.submit-container .login-pending {
				height: 3rem;
				width: 3rem;
				background-color: #07beb8;
				position: absolute;
				border-radius: 50%;
				right: 1rem;
				bottom: -0.5rem;
				opacity: 0;
				overflow: hidden;
				transform: translate(0, 0) scale(0.5, 0.5);
				transition: transform 0.2s ease-in, scale 0.2s ease-in;
				z-index: 1;
			}

			.submit-container .login-pending .login-granted-content {
				background-image: url(https://res.cloudinary.com/dgmilxzy7/image/upload/c_scale,w_700,o_25,b_rgb:07beb8/v1506735375/CodePen/ViddenPixel.jpg);
				background-position: center;
				background-size: cover;
				color: #ffffff;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100%;
				width: 100%;
				opacity: 0;
				position: absolute;
				top: 0;
				left: 0;
				transition: opacity 0.2s ease-in 0.2s;
				text-shadow: 0px 0px 20px #ffffff;
			}

			.submit-container .login-pending .login-granted-content .material-icons {
				font-size: 5px;
				position: relative;
				left: 1.25px;
			}

			.spinner {
				width: 3rem;
				height: 3rem;
				position: relative;
				margin: 0 auto;
			}

			.spinner .dot1,
			.spinner .dot2 {
				width: 100%;
				height: 100%;
				border-radius: 50%;
				background-color: #68d8d6;
				opacity: 0.6;
				position: absolute;
				top: 0;
				left: 0;
				-webkit-animation: dot-bounce 2s infinite ease-in-out;
				animation: dot-bounce 2s infinite ease-in-out;
			}

			.spinner .dot2 {
				-webkit-animation-delay: -1s;
				animation-delay: -1s;
			}

			@-webkit-keyframes dot-bounce {

				0%,
				100% {
					-webkit-transform: scale(0);
				}

				50% {
					-webkit-transform: scale(1);
				}
			}

			@keyframes dot-bounce {

				0%,
				100% {
					transform: scale(0);
					-webkit-transform: scale(0);
				}

				50% {
					transform: scale(1);
					-webkit-transform: scale(1);
				}
			}

			#registerForm {
				display: none;
			}
		</style>
	</head>

	<body>
		<div class="tile">
			<div class="tile-header">
				<h2 id="title"
					style="color: white; opacity: .75; font-size: 4rem; display: flex; justify-content: center; align-items: center; height: 100%;padding: 0;margin: 0;">
					SIGN IN</h2>
			</div>

			<div class="tile-body">
				<!-- 登录表单 -->
				<form id="loginForm">
					<label class="form-input">
						<i class="material-icons">person</i>
						<input type="text" id="loginUser" autofocus="true" required />
						<span class="label">Username</span>
						<span class="underline"></span>
					</label>

					<label class="form-input">
						<i class="material-icons">lock</i>
						<input type="password" id="loginPwd" required />
						<span class="label">Password</span>
						<div class="underline"></div>
					</label>

					<div class="submit-container clearfix" style="margin-top: 2rem;">
						<div id="submit" role="button" type="button" class="btn btn-irenic float-right" tabindex="0">
							<span>SIGN IN</span>
						</div>

						<div class="login-pending">
							<div class=spinner>
								<span class="dot1"></span>
								<span class="dot2"></span>
							</div>
							<div class="login-granted-content">
								<i class="material-icons">done</i>
							</div>
						</div>
					</div>
				</form>

				<!-- 注册表单 -->
				<form id="registerForm">
					<label class="form-input">
						<i class="material-icons">person</i>
						<input type="text" id="regUser" autofocus="true" required />
						<span class="label">Username</span>
						<span class="underline"></span>
					</label>

					<label class="form-input">
						<i class="material-icons">lock</i>
						<input type="password" id="regPwd" required />
						<span class="label">Password</span>
						<div class="underline"></div>
					</label>

					<label class="form-input">
						<i class="material-icons">lock</i>
						<input type="password" id="regPwd2" required />
						<span class="label">Confirm Password</span>
						<div class="underline"></div>
					</label>

					<div class="submit-container clearfix" style="margin-top: 2rem;">
						<div id="registerBtn" role="button" type="button" class="btn btn-irenic float-right" tabindex="0">
							<span>REGISTER</span>
						</div>

						<div class="login-pending">
							<div class=spinner>
								<span class="dot1"></span>
								<span class="dot2"></span>
							</div>
							<div class="login-granted-content">
								<i class="material-icons">done</i>
							</div>
						</div>
					</div>
				</form>

				<div class="text-center">
					<span id="toggleText">No account? Register now</span>
				</div>
			</div>
		</div>

		<script>
			var $submit = document.getElementById("submit");
			var $registerBtn = document.getElementById("registerBtn");
			var $loginForm = document.getElementById("loginForm");
			var $registerForm = document.getElementById("registerForm");
			var $toggleText = document.getElementById("toggleText");
			var $title = document.getElementById("title");

			// 切换登录/注册
			let isLogin = true;
			$toggleText.addEventListener('click', function () {
				isLogin = !isLogin;
				if (isLogin) {
					$loginForm.style.display = 'block';
					$registerForm.style.display = 'none';
					$title.textContent = 'SIGN IN';
					$toggleText.textContent = 'No account? Register now';
				} else {
					$loginForm.style.display = 'none';
					$registerForm.style.display = 'block';
					$title.textContent = 'REGISTER';
					$toggleText.textContent = 'Have an account? Sign in';
				}
			});

			// 登录功能
			async function signIn() {
				const username = document.getElementById('loginUser').value.trim();
				const password = document.getElementById('loginPwd').value.trim();

				if (!username || !password) {
					alert('请输入用户名和密码');
					return;
				}

				try {
					const res = await fetch('http://localhost:3000/api/login', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ username, password })
					});
					const data = await res.json();
					if (data.code === 200) {
						window.location.href = "shou.html";
					} else {
						alert(data.msg);
					}
				} catch (err) {
					alert('网络错误，登录失败');
					console.log(err);
				}
			}

			// 注册功能
			async function register() {
				const username = document.getElementById('regUser').value.trim();
				const password = document.getElementById('regPwd').value.trim();
				const password2 = document.getElementById('regPwd2').value.trim();

				if (!username || !password || !password2) {
					alert('请填写完整信息');
					return;
				}
				if (password !== password2) {
					alert('两次输入的密码不一致');
					return;
				}

				try {
					const res = await fetch('http://localhost:3000/api/register', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ username, password })
					});
					const data = await res.json();
					alert(data.msg);

					if (data.code === 200) {
						isLogin = true;
						$loginForm.style.display = 'block';
						$registerForm.style.display = 'none';
						$title.textContent = 'SIGN IN';
						$toggleText.textContent = 'No account? Register now';
					}
				} catch (err) {
					alert('网络错误，注册失败');
					console.log(err);
				}
			}

			// 绑定按钮点击事件
			$submit.addEventListener('click', signIn);
			$registerBtn.addEventListener('click', register);
		</script>
	</body>

	</html>
